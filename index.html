<!DOCTYPE html>
<html>
<head>
  <title>CyberShield Password Analyzer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #121a2b;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    .bar {
      height: 10px;
      background: #1f2937;
      border-radius: 10px;
      margin-top: 15px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
    }

    .score {
      margin-top: 10px;
      font-size: 13px;
      color: #9ca3af;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🛡️ CyberShield Analyzer</h1>
    <div class="sub">Evaluate password security using real-world patterns</div>

    <input type="text" id="password" placeholder="Enter password">

    <button onclick="analyze()">Analyze Security</button>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>

    <div class="result" id="result"></div>
    <div class="score" id="score"></div>
    <div id="badge"></div>
  </div>

  <script>
    function analyze() {
      let pw = document.getElementById("password").value;
      let score = 0;

      // Common weak passwords
      let weakList = ["123456", "password", "12345678", "qwerty"];

      if (pw.length >= 8) score += 25;
      if (/[A-Z]/.test(pw)) score += 15;
      if (/[0-9]/.test(pw)) score += 15;
      if (/[^A-Za-z0-9]/.test(pw)) score += 25;
      if (!weakList.includes(pw)) score += 20;

      let fill = document.getElementById("fill");
      let result = document.getElementById("result");
      let scoreText = document.getElementById("score");
      let badge = document.getElementById("badge");

      fill.style.width = score + "%";

      if (score < 40) {
        fill.style.background = "#ef4444";
        result.innerText = "❌ Weak password — vulnerable to brute-force attacks";
        badge.innerHTML = "<span class='badge' style='background:#ef4444;'>HIGH RISK</span>";
      } 
      else if (score < 75) {
        fill.style.background = "#f59e0b";
        result.innerText = "⚠️ Moderate security — improve complexity";
        badge.innerHTML = "<span class='badge' style='background:#f59e0b;'>MEDIUM RISK</span>";
      } 
      else {
        fill.style.background = "#22c55e";
        result.innerText = "✅ Strong password — good security practice";
        badge.innerHTML = "<span class='badge' style='background:#22c55e;'>SECURE</span>";
      }

      scoreText.innerText = "Security Score: " + score + "/100";
    }
  </script>

</body>
</html>
